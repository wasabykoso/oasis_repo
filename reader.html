            <p>Красно-чёрные волосы, которыми она так гордилась, которые вечно заплетала в сложные косы, перевивая лентами и шнурками, сейчас торчали в разные стороны дикими патлами. Слипшиеся от пота, от пепла, от чего-то ещё — может, от крови, не её, чужой. Один особенно длинный локон прилип ко лбу, закрывая левый глаз, и Марта даже не пыталась его убрать — будто не замечала.</p>
            <p>Она тяжело дышала.</p>
            <p>Рэй слышал это дыхание — прерывистое, со свистом, с каким-то булькающим призвуком в груди. Бежала. Сквозь строй. Сквозь страх. Сквозь собственную боль. Бежала к нему, хотя любой здравомыслящий человек побежал бы в противоположную сторону.</p>
            <p>И она смотрела на него так...</p>
            <p>Рэй не мог расшифровать этот взгляд. Слишком много всего намешано. Страх — да, определённо, его нельзя было не заметить. Зрачки расширены так, что радужка почти не видна, зрачки человека, который только что видел смерть вблизи и чудом избежал её. Облегчение — странно, дико, но тоже присутствовало, читалось в том, как она выдохнула, увидев его лицо, как плечи её на миллиметр опустились, расслабляясь. Боль — откуда? Она же не ранена, порез на щеке — ерунда, царапина. Но боль была, Рэй видел её в том, как Марта прикусила нижнюю губу, как мелко дрожали уголки её рта.</p>
            <p>И что-то ещё.</p>
            <p>Что-то глубоко внутри, в самой темноте её глаз — таких карих, что в сумерках они казались чёрными. Что-то, от чего Рэю захотелось отвернуться. Потому что это было слишком личное. Слишком интимное. Слишком... настоящее.</p>
            <p class="dialogue">— Ты... — Марта сглотнула. Рэй видел, как двинулся её кадык — тонкая шея, выступающие ключицы, впалая грудь под изодранной курткой. — Ты вернулся.</p>
            <p>Рэй моргнул.</p>
            <p>Вернулся?</p>
            <p>А он уходил?</p>
            <p>И тут же в голову ударило — воспоминание. Нет, даже не воспоминание, а просто ощущение. Другое тело. Другие мысли. Другая, ледяная пустота внутри, из которой он смотрел на Торина и Элис и не чувствовал ровным счётом ничего. Абсолютный ноль. Вакуум. Та пустота, что бывает только в космосе — между звёздами, где нет воздуха, нет звука, нет тепла, только бесконечный холод и равнодушие материи.</p>
            <p>И в этом вакууме было так спокойно. Так правильно. Так легко.</p>
            <p>Потому что боль осталась где-то за стеклом. Отгороженная, изолированная, безопасная. А он просто наблюдал, как мир избавляется от тех, кто эту боль причинил. Наблюдал и чувствовал — впервые за долгое время — что справедливость существует. Что она жестокая, страшная, необратимая — но есть.</p>
            <p>Это был он?</p>
            <p>Или не он?</p>
            <p class="dialogue">— Рэй, посмотри на меня.</p>
            <p>Марта сделала шаг вперёд. Её сапог — левый, с оторванным почти наполовину носком — ступил на чёрную, спекшуюся землю, и под ним противно хрустнуло. Что-то стеклянное? Кости? Рэй не хотел знать.</p>
            <p>Потом ещё шаг.</p>
            <p>И ещё.</p>
            <p>Её рука протянулась к нему — медленно, очень медленно, будто она приближалась к дикому зверю, который может и укусить, и лизнуть, и неизвестно, что страшнее. Пальцы — грязные, с обломанными ногтями, в мелких порезах и ссадинах — зависли в сантиметре от его плеча.</p>
            <p>Не коснулись.</p>
            <p>Замерли.</p>
            <p class="dialogue">— Просто посмотри на меня, — голос её дрожал, срывался, но она держалась. — Скажи что-нибудь. Всё что угодно. Просто скажи.</p>
            <p>Рэй открыл рот.</p>
            <p>И ничего не сказал.</p>
            <p>Потому что говорить было нечем. Слова кончились. Все до одного. Иссякли, как вода в пересохшем колодце. Осталась только эта проклятая тишина в ушах и картинка перед глазами — Марта, грязная, живая, тянет к нему руку и боится дотронуться.</p>
            <p>Боится его.</p>
            <p>Имеет полное право бояться.</p>
            <p class="dialogue">— Оливер, — вдруг выдохнула Марта, резко обернувшись. Голос её стал жёстче, требовательнее. — Оливер, иди сюда. Быстро.</p>
            <p>Рэй проследил за её взглядом.</p>
            <p>Оливер сидел на земле метрах в десяти. Его рыжие волосы, вечно торчащие в разные стороны, создавая вокруг головы эффект одуванчика, пережившего ядерный взрыв, сейчас прилипли ко лбу мокрыми прядями, закрывая половину лица. Он сжимал в руках какую-то склянку — единственную уцелевшую, судя по тому, с какой отчаянной нежностью он прижимал её к груди. Склянка была цела — чудо, настоящее чудо, учитывая, что творилось вокруг полчаса назад.</p>
            <p>И смотрел Оливер на Рэя так, будто перед ним не друг, с которым они вместе взрывали лабораторию, травили друг друга экспериментальными зельями и чуть не сгорели заживо в лесу, спасаясь от охотников. Будто перед ним мина с выдернутой чекой. Будто любое неосторожное движение — и рванёт так, что мало не покажется.</p>
            <p class="dialogue">— Я... — голос Оливера сел, сорвался на сип, и он прокашлялся, закашлялся, вытирая рот тыльной стороной ладони. — Я тут посижу, ладно? Тут хорошо. Тут тепло. Почему-то очень тепло, хотя только что был адский холод, вы не заметили? Я заметил. Я вообще много чего замечаю. Например, что у меня штаны мокрые. Не спрашивайте почему. Сам не знаю. Может, от росы. Хотя какая роса, когда тут всё выжжено к чёртовой матери? А может, это я от страха... ну, вы понимаете. Не важно. В общем, я тут посижу. Вы не стесняйтесь, общайтесь. Я мешать не буду.</p>
            <p>Он говорил слишком быстро. Слишком громко. Слишком — как заводная игрушка, у которой сломался регулятор. Слова сыпались из него градом, бессмысленные, хаотичные, цепляющиеся друг за друга, спотыкающиеся и падающие.</p>
            <p>И Рэй вдруг с пугающей ясностью понял: Оливер в шоке.</p>
            <p>Он прикрывается своей дурацкой болтовнёй, потому что иначе развалится. Потому что только что видел то, что никто не должен видеть. То, от чего у нормального человека крыша едет окончательно и бесповоротно. То, что сам Рэй видел только глазами той, другой личности — и то не до конца, урывками, как в тумане.</p>
            <p class="dialogue">— Оливер, — Марта сказала это тихо, но так, что он сразу заткнулся. Голос у неё вообще был удивительный — мягкий, но с железной серединкой. Таким голосом останавливают взбесившихся лошадей и успокаивают плачущих детей. — Иди сюда. Пожалуйста.</p>
            <p>Оливер встал.</p>
            <p>Ноги его не слушались. Это было видно невооружённым глазом — как он переступает, будто заново учится ходить, как колени подкашиваются на каждом шагу. Он сделал шаг — споткнулся о собственный рюкзак, который валялся рядом, выругался длинно и витиевато, с таким смаком, что даже Рэй, который думал, что его уже ничем не удивить, мысленно отметил пару новых оборотов.</p>
            <p>Потом ещё шаг.</p>
            <p>Ещё.</p>
            <p>И вот они стояли втроём.</p>
            <p>Марта — чуть впереди, правая рука чуть отведена назад, будто она готова в любой момент прикрыть Оливера собой. Оливер — сзади, чуть левее, склянка в руке, взгляд бегающий, губы шевелятся беззвучно — кажется, он читал молитву. Или перечислял ингредиенты какого-нибудь зелья. Или просто считал до ста, чтобы не сойти с ума.</p>
            <p>И Рэй.</p>
            <p>Рэй, который стоял напротив них и не знал, имеет ли право называться человеком.</p>
            <p class="important">— Я их убил.</p>
            <p>Он сказал это вслух. Просто чтобы услышать, как это звучит. Голос прозвучал так, будто он не пользовался им лет сто — хрипло, сипло, чужим тембром. Будто говорил не он, а кто-то другой, спрятанный глубоко внутри.</p>
            <p>Звучало так же, как и в голове — глухо и бесповоротно. Как приговор, который сам себе вынес.</p>
            <p class="important">— Я их убил, — повторил он. — Торина. Элис. Я стёр их. Просто... взял и стёр. Даже не руками. Мыслью. Желанием.</p>
            <p>Он посмотрел на свои ладони.</p>
            <p>Обычные руки. Такие же, как всегда. Чуть обветренные, в мелких шрамах от работы в мастерской, с мозолями на пальцах от инструментов. На правой, у указательного пальца, свежий ожог — вчера, кажется, или позавчера, он чинил какую-то лампу для Марты и зазевался.</p>
            <p>Ни крови. Ни пепла. Ничего.</p>
            <p>Чистые руки.</p>
            <p class="dialogue">— Ты защищался, — быстро сказал Оливер, делая шаг вперёд — и тут же замирая, будто испугавшись собственной смелости. — Они же... они хотели... ну, они вообще тебя развести хотели, как последнего лоха. Всё подстроили. С самого начала. И Торин этот... и Элис... я слышал, как она с ним говорила, я случайно услышал, они не знали, что я рядом, а я травы собирал, там, за скалой, и... в общем, технически это самооборона. Ну, или что-то вроде того. Знаешь, есть такой юридический термин — необходимая оборона. Вот это оно и было. С процентами.</p>
            <p class="dialogue">— Оливер, заткнись, — перебила Марта. Без злости. Устало.</p>
            <p>Она всё ещё смотрела на Рэя. И взгляд её изменился.</p>
            <p>Страх не ушёл — он был, никуда не делся, прятался где-то в уголках глаз, в том, как она то и дело облизывала пересохшие губы. Но к нему примешалось что-то другое.</p>
            <p>Не жалость — Рэй ненавидел жалость, она была хуже пощёчины. Не понимание — какое тут понимание, когда он сам себя не понимал.</p>
            <p>Что-то иное.</p>
            <p>Что-то, от чего у Рэя заныло в груди. Там, где, казалось, уже ничего не может болеть, потому что всё болит и зажило неправильно, криво, шишками и шрамами.</p>
            <p class="dialogue">— Ты не убивал их, — тихо сказала Марта. — Не так, как ты думаешь.</p>
            <p>Рэй посмотрел на неё непонимающе. Брови сошлись к переносице, образовав глубокую морщину — ту самую, которая появлялась, когда он пытался понять сложный механизм или разобраться в чьих-то запутанных чувствах.</p>
            <p class="dialogue">— Что?</p>
            <p class="dialogue">— Ты... — Марта запнулась. Подбирала слова. Рэй видел, как она перебирает их в голове, отбрасывает один вариант за другим, ищет тот единственный, который сможет вместить всё. — Это была не ты. Не тот Рэй, который чинил лампы. И не тот, который учился контролировать свою силу. Это было... что-то другое. Оно вышло из тебя, когда ты сломался. Я видела. Я стояла там, за скалой, я всё видела. Оно смотрело твоими глазами, двигалось твоим телом, но это был не ты.</p>
            <p>Рэй молчал.</p>
            <p>Марта шагнула ближе. Ещё на шаг. Теперь между ними было меньше метра.</p>
            <p class="dialogue">— Ты помнишь? — спросила она. — Что ты чувствовал в тот момент? Не когда всё закончилось, а когда началось. Когда ты понял, что она... что они...</p>
            <p>Она не договорила. Не нужно было.</p>
            <p>И Рэй задумался.</p>
            <p>Помнил ли он?</p>
            <p>Да.</p>
            <p>Он помнил всё.</p>
            <p>Как стоял у водопада. Как слушал её слова — такие же красивые, как всегда, но теперь в них не было тепла, только лёд, только расчёт, только та холодная жестокость, с которой хирург разрезает живую плоть, не чувствуя ничего, кроме профессионального интереса.</p>
            <p>Как внутри что-то лопнуло.</p>
            <p>Та самая плотина, которую он строил годами. Кирпичик за кирпичиком. Каждое утро, просыпаясь, он клал новый кирпич: "Я справлюсь. Я не сорвусь. Я не такой, как они думают". Каждый вечер, засыпая, проверял кладку: "Держится. Пока держится. Ещё один день".</p>
            <p>А она — Элис, его жена, его надежда, его будущее — стояла и улыбалась, глядя на эту плотину, и говорила Торину: "Смотри, как трещит. Ещё чуть-чуть — и рухнет".</p>
            <p>И плотина рухнула.</p>
            <p>В эту трещину хлынуло что-то чужое и одновременно своё. Глубинное. Древнее. То, что всегда жило в нём, но спало, свернувшись калачиком в самом тёмном углу души. То, что он чувствовал иногда по ночам, когда боль становилась невыносимой — тогда оно шевелилось, ворочалось, но не просыпалось.</p>
            <p>Сейчас оно проснулось.</p>
            <p>Подняло голову, потянулось, довольно урча: <span class="important">«Наконец-то. Наконец-то ты меня позвал. Наконец-то перестал прятаться за этой жалкой человечностью. Наконец-то стал собой».</span></p>
            <p>И ему, Рэю, стало вдруг так легко.</p>
            <p>Так свободно.</p>
            <p>Так правильно.</p>
            <p>Потому что ответственность за выбор перестала быть его. Он просто отдал контроль и наблюдал. Как зритель в театре. Как читатель, переворачивающий страницы книги, где главный герой — кто-то другой, и не надо решать за него, не надо мучиться, не надо бояться ошибиться.</p>
            <p>Наблюдал, как его руки делают то, о чём он всегда мечтал в самых тёмных, самых запретных углах сознания.</p>
            <p>Как наказывают.</p>
            <p>Как мстят.</p>
            <p>Как стирают в пыль тех, кто посмел сделать ему больно.</p>
            <p>Это было прекрасно.</p>
            <p>И это было чудовищно.</p>
            <p class="important">— Я помню, — сказал Рэй. Голос его звучал глухо, как из бочки. — И мне... мне было хорошо.</p>
            <p>Он поднял глаза на Марту. В них не было защиты. Только голая, неприкрытая правда — такая, от которой обычно отворачиваются, потому что смотреть на неё невыносимо.</p>
            <p class="important">— Мне было хорошо, когда они умирали. Я чувствовал... силу. Свободу. Я думал: «Так им и надо. Получите. За всё получите». А теперь... теперь я не знаю, что с этим делать. Потому что это тоже я. Не монстр, не демон, не чужой. Я. Часть меня. Которая хочет убивать, когда ей больно. Которая наслаждается этим. Которая...</p>
            <p>Он замолчал. Горло перехватило спазмом.</p>
            <p>Тишина повисла в воздухе густая, как смола. Казалось, её можно резать ножом — и куски будут падать на землю с мягким, влажным звуком.</p>
            <p>Оливер открыл рот, закрыл, снова открыл. На этот раз даже он не нашёлся, что сказать. Он переводил взгляд с Рэя на Марту и обратно, и в глазах его плескалось что-то среднее между ужасом и состраданием.</p>
            <p>А Марта...</p>
            <p>Марта сделала то, чего Рэй совсем не ожидал.</p>
            <p>Она шагнула вперёд и обняла его.</p>
            <h3>3. Тепло</h3>
            <p>Просто обняла.</p>
            <p>Прижалась всем телом — худым, дрожащим, таким живым. Уткнулась лицом ему в грудь, прямо в то место, где под курткой бешено колотилось сердце. И стояла так, дрожа.</p>
            <p>Её руки сжимали его куртку с такой силой, что костяшки побелели. Рэй чувствовал, как пальцы впиваются в ткань, как ногти — обломанные, неровные — царапают материал, пытаясь ухватиться покрепче, будто она боялась, что он исчезнет, растворится, превратится в ту, другую личность, если хоть на секунду ослабит хватку.</p>
            <p>Она дрожала.</p>
            <p>Всё её тело дрожало — мелкой, частой дрожью, которую невозможно контролировать. Дрожала спина под курткой, дрожали плечи, дрожали руки. И сквозь эту дрожь пробивалось тепло — живое, человеческое тепло, которого Рэй, казалось, не чувствовал уже целую вечность.</p>
            <p>От неё пахло дымом. Потом. Кровью. И ещё чем-то неуловимым, чем пахнут только живые люди — тем сложным, тёплым запахом, который не поддаётся описанию, но без которого мир становится пустым и мёртвым.</p>
            <p>Рэй замер.</p>
            <p>Его руки висели вдоль тела, не зная, что делать. Они были тяжёлыми, чужими, непослушными. Он не мог обнять её в ответ. Не имел права. Этими руками он только что убил двух человек. Пусть даже они заслужили. Пусть даже та, другая часть его, наслаждалась процессом. Пусть даже Марта сама пришла к нему.</p>
            <p>Он не имел права.</p>
            <p>Но она не отпускала.</p>
            <p class="dialogue">— Ты идиот, — прошептала Марта куда-то в район его ключицы. Голос её был приглушён тканью куртки, но Рэй расслышал каждое слово. — Ты просто невероятный, гениальный, безнадёжный идиот.</p>
            <p>Рэй моргнул.</p>
            <p class="dialogue">— Что?</p>
            <p>Она отстранилась ровно настолько, чтобы посмотреть ему в глаза. Её лицо было мокрым от слёз — они текли по щекам, смешиваясь с грязью и кровью, оставляя светлые дорожки на тёмной коже. Нос распух и покраснел. Губы дрожали.</p>
            <p>Но голос звучал твёрдо.</p>
            <p class="dialogue">— Ты думаешь, мы не знали? — сказала она. — Думаешь, мы с Оливером не понимали, с кем идём?</p>
            <p>Она шмыгнула носом и вытерла слёзы рукавом, размазывая грязь по лицу ещё сильнее. Теперь она стала похожа на нашкодившего ребёнка, который полдня провозился в луже.</p>
            <p class="dialogue">— Думаешь, я не видела ту тьму в тебе? — продолжила она. — С первого дня видела. Когда ты стоял на скале, и твой нимб резал реальность, а вокруг валялись трупы охотников. Я всё видела.</p>
            <p>Она перевела дыхание. Грудь её ходила ходуном, но она не останавливалась.</p>
            <p class="dialogue">— И что? Ты думаешь, я пошла с тобой, потому что ты был «хорошим»? Нет. Я пошла с тобой, потому что ты был настоящим. Ты не притворялся. Ты боролся. Каждый день. Каждую минуту. Ты падал в эту тьму, а потом выползал обратно. И я видела, как тебе больно. И я...</p>
            <p>Её голос дрогнул. Сорвался.</p>
            <p class="important">— Я не могла оставить тебя одного в этой боли. Понимаешь? Не могла.</p>
            <p>Рэй смотрел на неё и не верил.</p>
            <p>Не верил, что такое бывает. Что кто-то может видеть всё дерьмо, которое в нём есть — всю эту тьму, всю эту грязь, всю эту способность к насилию, которая только что проявилась во всей красе — и не отвернуться. Не убежать. Не закричать "чудовище".</p>
            <p>Стоять и смотреть. И плакать. И обнимать.</p>
            <p class="dialogue">— Но я только что... — начал он.</p>
            <p class="dialogue">— Ты только что сломался, — перебила Марта. Жёстко, почти зло. — Ты не выдержал. Столько лет тебя предавали, унижали, использовали — и ты терпел. Ты терпел, когда отец в тебе только рабочие руки видел. Ты терпел, когда Торин тебя подставил. Ты терпел, когда весь город от тебя отвернулся. Ты терпел, когда охотники за тобой гонялись. Ты терпел, когда мир говорил тебе, что ты монстр. Ты терпел.</p>
            <p>Она ткнула его пальцем в грудь. Больно, в самое солнечное сплетение.</p>
            <p class="important">— А сегодня они перешли черту. Сегодня они убили не твоё тело, а твою душу. И та часть тебя, которая устала терпеть, взяла верх. Это не делает тебя монстром. Это делает тебя живым.</p>
            <p class="dialogue">— Она права, — вдруг подал голос Оливер.</p>
            <p>Он стоял чуть поодаль, но теперь подошёл ближе. Осторожно, как к раненому зверю, но подошёл. Его лицо было бледным — бледнее обычного, а это, учитывая его обычную бледность, было достижением. Но в глазах уже загорался знакомый безумный огонёк — тот самый, с которым он лез в самые опасные эксперименты.</p>
            <p class="dialogue">— Слушай, я, конечно, специалист по взрывам, а не по душам. — Оливер говорил медленно, тщательно подбирая слова — что само по себе было чудом. — Но я своими глазами видел, как ты... ну, это. Как ты их... в общем, ты понял. И знаешь что? Я офигел. Я сидел там и думал: «Всё, приехали, сейчас он и нас за компанию». Потому что эта штука, что из тебя вылезла — она не разбирала, кто свой, кто чужой. Она просто жрала всё подряд.</p>
            <p>Он сглотнул. Кадык дёрнулся.</p>
            <p class="dialogue">— Но ты... ты нас не тронул. Даже когда та хрень внутри тебя орала и рвалась наружу, даже когда ты сам себя не контролировал — ты нас не тронул. Почему?</p>
            <p>Рэй задумался.</p>
            <p>Почему?</p>
            <p>Ведь та, другая часть, не знала пощады. Она уничтожила Торина и Элис даже не задумываясь. С наслаждением. Смакуя каждое мгновение. Почему же Марта и Оливер остались живы?</p>
            <p>Он попытался вспомнить тот момент. Когда внутри бушевало пламя, когда реальность плавилась и текла, когда хотелось только одного — чтобы боль прекратилась, чтобы никто и никогда больше не мог сделать ему больно.</p>
            <p>И сквозь этот ад, сквозь рёв разрушения, сквозь крик собственной души — он слышал их.</p>
            <p>Марта. Её голос. Она звала его по имени. Не "чудовище", не "монстр", не "тварь". По имени. Рэй.</p>
            <p>Оливер. Его дурацкая болтовня, бессмысленная, нелепая, но такая родная. Он что-то кричал про взрывы, про зелья, про то, что "мы ещё повоюем, парни, не сегодня".</p>
            <p>Они не бросили его. Не убежали. Не спрятались.</p>
            <p>Они были рядом.</p>
            <p>И даже та, ледяная пустота внутри, которая хотела только уничтожать — она не могла их тронуть. Потому что они были частью того немногого, что Рэй хотел сохранить. Даже в самом аду.</p>
            <p class="important">— Я... не знаю, — честно сказал он. — Наверное, потому что вы... вы мои.</p>
            <p class="dialogue">— А я знаю, — Оливер ткнул его пальцем в грудь — точно так же, как только что Марта. — Потому что ты — это ты. Даже когда внутри тебя сидит демон, готовый всех порвать, ты всё равно остаёшься тем придурком, который чинил лампы бесплатно. Потому что ты не можешь иначе. Это у тебя в крови. Это твоя настоящая суперсила — быть идиотом, который не сдаётся.</p>
            <p>Рэй смотрел на них двоих.</p>
            <p>На Марту — перепачканную, уставшую, с мокрым от слёз лицом, но с таким упрямым выражением, будто она готова была спорить до хрипоты, до потери пульса, до конца света.</p>
            <p>На Оливера — бледного, трясущегося, но уже улыбающегося своей кривой, безумной улыбкой, от которой обычно хотелось спрятаться подальше, а сейчас — прижаться и не отпускать.</p>
            <p>Они стояли рядом.</p>
            <p>С ним.</p>
            <p>Несмотря на всё.</p>
            <p>И вдруг что-то в груди сжалось.</p>
            <p>Не больно. Наоборот — так, будто отогреваться начало. Маленький такой островок тепла посреди ледяной пустыни, в которую превратилась его душа. Сначала крошечный — с горошину. Потом больше — с монету. Потом ещё — с ладонь.</p>
            <p>Тепло разливалось медленно, осторожно, будто боялось, что его спугнут. Но оно росло.</p>
            <p class="dialogue">— Вы... — голос его сорвался. Пришлось прокашляться, чтобы продолжить. — Вы правда не боитесь?</p>
            <p class="dialogue">— Боимся, — честно ответила Марта. — Ещё как боимся. Я, например, сейчас трясусь так, что зубы стучат. Слышишь?</p>
            <p>Она приоткрыла рот, и Рэй действительно услышал — мелкую, частую дробь зубов.</p>
            <p class="dialogue">— Но это не важно.</p>
            <p class="dialogue">— А что важно?</p>
            <p class="dialogue">— То, что ты есть.</p>
            <p>Она посмотрела ему прямо в глаза. В самую глубину. Туда, где ещё недавно бушевала тьма, а теперь робко разгорался огонёк.</p>
            <p class="important">— Ты. Не тот, кого из тебя делали. Не тот, кого ты боишься стать. А тот, кто прямо сейчас стоит здесь и пытается понять, как жить дальше. Это важно.</p>
            <p>Рэй молчал долго.</p>
            <p>Так долго, что Оливер начал переминаться с ноги на ногу, а Марта уже открыла рот, чтобы что-то сказать, может, спросить, не случилось ли чего.</p>
            <p>Но Рэй заговорил первым.</p>
            <p class="important">— Я не знаю, что теперь будет.</p>
            <p>Голос его звучал тихо, но ровно. Без истерики. Без надрыва. Просто констатация факта.</p>
            <p class="important">— Я не знаю, как на это посмотрят в мире. Если узнают — убьют. Или попытаются. Гильдия охотников просто так не отстанет. А если не узнают... если мы спрячемся, будем жить в этих чёртовых шахтах, как крысы... я сам себя сожру изнутри. Потому что я...</p>
            <p>Он запнулся. Сглотнул.</p>
            <p class="important">— Я убил их. Не в бою. Не защищаясь. Просто стёр. И часть меня до сих пор считает, что это правильно. Что они получили по заслугам. И я не знаю, как с этим жить. Как смотреть на себя в зеркало и не видеть там... его. Ту тварь, которая вылезла из меня.</p>
            <p>Он перевёл взгляд на Марту.</p>
            <p class="important">— Как с этим жить?</p>
            <p>Марта взяла его руку в свои.</p>
            <p>Её ладони были холодными — замёрзла, пока тряслась, пока боялась, пока бежала к нему. Но прикосновение было тёплым. Или это его руки были ледяными, и её тепло передавалось ему? Рэй не знал. Не мог разобрать, где кончается одно и начинается другое.</p>
            <p>Она переплела свои пальцы с его. Сжала. Крепко.</p>
            <p class="dialogue">— Не знаю, — сказала она. — Не знаю. Я вообще ничего не знаю. Я не психолог, не мудрец, не святая. Я просто девчонка, которая влюбилась в монстра и теперь пытается понять, как сделать так, чтобы ему не было больно.</p>
            <p>Она говорила это и смотрела на их сплетённые пальцы. Не на него. Будто боялась, что если поднимет глаза, то не сможет договорить.</p>
            <p class="important">— Но я знаю одно. Мы будем жить вместе. Ты, я, Оливер. Может, ещё кто-то потом, если повезёт. Мы будем искать ответ. Будем ошибаться. Будем снова падать в эту тьму. Но мы будем рядом. И каждый раз, когда ты будешь падать, мы будем протягивать тебе руку. А ты — нам. Так и выживем. По кусочкам. По дням. По секундам.</p>
            <p>Она подняла глаза.</p>
            <p class="dialogue">— Хорошо?</p>
            <p>Рэй смотрел на их сплетённые пальцы.</p>
            <p>Её рука в его руке.</p>
            <p>Та самая рука, которой он убивал.</p>
            <p>Та самая рука, которая ещё час назад была инструментом смерти.</p>
            <p>И она всё равно держала его. Не брезговала. Не боялась. Не отворачивалась.</p>
            <p class="important">— Хорошо, — прошептал он.</p>
            <h3>4. Тот, кто ждал</h3>
            <p>В этот момент что-то изменилось.</p>
            <p>Не вокруг — внутри. В самой глубине сознания Рэя что-то шевельнулось. Что-то, что он принял было за ту, другую личность, за ту ледяную пустоту, что недавно ruleла бал, — но нет. Это было иначе.</p>
            <p>Тихо.</p>
            <p>Спокойно.</p>
            <p>Почти устало.</p>
            <p class="important">— Интересно, — раздался голос.</p>
            <p>Не в ушах — прямо в голове. Такой отстранённый, будто говоривший смотрел на них откуда-то с огромного расстояния. С высокой горы. С другой планеты. Из другого времени.</p>
            <p class="important">— Очень интересно.</p>
            <p>Рэй замер всем телом. Напрягся так, что Марта, державшая его за руку, сразу почувствовала.</p>
            <p class="dialogue">— Что? — спросила она, вглядываясь в его лицо. — Что случилось?</p>
            <p class="dialogue">— Ты слышишь? — Рэй посмотрел на неё.</p>
            <p class="dialogue">— Ничего. А что?</p>
            <p class="dialogue">— Голос, — сказал Рэй. — В голове. Кто-то говорит.</p>
            <p>Марта нахмурилась. Оливер, услышав это, подошёл ближе, на всякий случай сжимая в руке склянку с какой-то дрянью.</p>
            <p class="dialogue">— Кто? — спросила Марта. — Та штука, что вылезла из тебя?</p>
            <p class="dialogue">— Не знаю, — честно ответил Рэй. — Не похоже. По-другому как-то.</p>
            <p class="important">— Я — это я, — снова зазвучал голос. Спокойный, ровный, без эмоций. — И я — это ты. И не ты одновременно. Сложно объяснить. Но не бойся. Я не враг.</p>
            <p class="dialogue">— Тогда кто? — мысленно спросил Рэй, не зная, как обращаться к тому, кто, видимо, поселился у него в голове.</p>
            <p>Пауза.</p>
            <p>Долгая.</p>
            <p>Тягучая.</p>
            <p>Такая, что Рэй успел подумать: а не показалось ли? Может, это просто эхо, отголосок той бури, что только что бушевала?</p>
            <p>Но голос вернулся.</p>
            <p class="important">— Меня звали Аранис, — сказал он. — Когда-то очень давно. Теперь я просто... тень. Отголосок. Часть гримуара, которая слишком долго ждала и слишком хорошо запомнила, каково это — быть человеком.</p>
            <p>Рэй вздрогнул.</p>
            <p>Аранис.</p>
            <p>Первый Изгнанник.</p>
            <p>Тот, чья сила текла в его жилах. Тот, чьи слова он читал в гримуаре. Тот, чья тень преследовала его с самого начала.</p>
            <p class="dialogue">— Ты... ты был во мне всё это время?</p>
            <p class="important">— Я спал, — поправил голос. — Твоя боль разбудила меня. Но не та боль, что ты чувствуешь сейчас. Та, что ты чувствовал, когда они... когда она...</p>
            <p>Голос запнулся.</p>
            <p>Впервые за этот короткий разговор в нём проскользнуло что-то человеческое. Какая-то старая, застарелая боль, которую не вытравить ни временем, ни тысячелетиями забвения.</p>
            <p class="important">— Я знаю это чувство, — продолжил Аранис. — Потерю. Предательство. Когда весь мир сжимается до одной точки, и в этой точке — только желание сделать так, чтобы больше никогда не было больно. Чтобы никто и никогда не мог причинить тебе эту боль снова. Я тоже через это прошёл.</p>
            <p>Рэй молчал. Слушал.</p>
            <p class="dialogue">— И что ты сделал? — спросил он наконец.</p>
            <p class="important">— Сжёг всё, — просто ответил голос. — Дотла. Всех, кто был рядом. Всех, кто мог бы стать близким. Всех, кто хоть как-то был связан с той болью. Сжёг города. Сжёг страны. Сжёг целый континент. Думал, станет легче.</p>
            <p>Пауза.</p>
            <p class="important">— Не стало.</p>
            <p>Рэй представил это. Огромную фигуру на фоне горящего неба. Пепел, падающий с неба, как снег. Трупы, трупы, трупы — на сколько хватает глаз. И в центре всего этого — человек, который хотел только одного: чтобы ему не было больно.</p>
            <p class="important">— Ты сделал по-другому, — продолжил Аранис. — Ты убил их — да. Но остановился. Не дал мне вырваться до конца. А ведь я уже почти... почти был свободен. Ещё немного — и я бы вышел наружу. Насовсем. И тогда...</p>
            <p class="dialogue">— И тогда я бы стал тобой, — закончил Рэй.</p>
            <p class="important">— Да.</p>
            <p>Тишина.</p>
            <p>Рэй посмотрел на Марту. На Оливера. На их лица — испуганные, уставшие, но родные. Самые родные во всём мире.</p>
            <p class="dialogue">— Почему ты остановился? — спросил Аранис. В его голосе впервые появилось что-то похожее на искреннее любопытство. — Я чувствовал твою боль. Она была такой же, как моя. Такой же острой. Такой же всепоглощающей. Ты хотел уничтожить всё так же сильно, как хотел я. Почему ты остановился?</p>
            <p>Рэй долго думал над ответом.</p>
            <p>Почему?</p>
            <p>Потому что он вспомнил, как пахнут волосы Марты после дождя. Потому что в голове всплыло лицо Оливера, когда тот в очередной раз взорвал лабораторию и стоял счастливый, перепачканный сажей. Потому что где-то глубоко внутри, под всеми слоями боли и отчаяния, ещё теплилась та глупая, наивная вера в то, что мир может быть другим.</p>
            <p class="important">— Потому что они рядом, — ответил он. — Потому что, даже когда я провалился в эту тьму, я чувствовал их. Где-то далеко, но чувствовал. Они не бросили меня. Не убежали. Они были здесь. И я не мог... не мог их тоже...</p>
            <p class="important">— Понимаю, — голос Араниса звучал устало. Бесконечно устало. Так, будто он нёс эту усталость тысячу лет и ни разу не останавливался передохнуть. — У меня таких не было. В моё время — не было. Или я просто не заметил. Не разглядел за своей болью. Слишком был занят собственным страданием. А теперь поздно.</p>
            <p class="dialogue">— Ты жалеешь?</p>
            <p>Долгая пауза.</p>
            <p>Такая долгая, что Рэй уже решил — не ответит.</p>
            <p>Но голос вернулся.</p>
            <p class="important">— Не знаю. Я уже тысячу лет ничего не чувствую, кроме холода. Но глядя на тебя... кажется, я начинаю вспоминать, каково это — хотеть жить.</p>
            <p>Голос затих.</p>
            <p>Не исчез — Рэй чувствовал его присутствие где-то на границе сознания, тёплое (или уже не холодное?) пятно — но замолчал. Затаился. Давая пространство.</p>
            <p class="dialogue">— Рэй? — позвала Марта. — Ты где? Ты так долго молчал, мы уже испугались.</p>
            <p class="dialogue">— Здесь, — ответил он. — Я здесь.</p>
            <p>И это была правда.</p>
            <p>Впервые за долгое, долгое время — чистая, без примесей правда.</p>
            <h3>5. Утро</h3>
            <p>Они сидели на выжженной земле до рассвета.</p>
            <p>Оливер уснул первым.</p>
            <p>Просто вырубился — посреди фразы, на полуслове. Он что-то рассказывал — кажется, про то, как однажды его зелье случайно оживило дохлую крысу, и крыса потом неделю бегала за ним, требуя "продолжения банкета", — а потом глаза его закрылись сами собой, голова мотнулась в сторону, и он завалился на бок, прямо на свой драгоценный рюкзак.</p>
            <p>Рэй поймал его в последний момент, удерживая от падения лицом в грязь. Осторожно уложил поудобнее, подложил под голову свернутую куртку.</p>
            <p>Оливер даже не проснулся. Только вздохнул во сне — глубоко, по-детски — и засопел, подёргивая во сне плечами. Наверное, догонял во сне тех, от кого убегал наяву.</p>
            <p>Марта боролась со сном долго.</p>
            <p>Сидела, обхватив колени руками, и смотрела в темноту. Рэй видел, как её глаза слипаются, как голова то и дело клонится вниз, как она встряхивается, заставляя себя не спать.</p>
            <p class="dialogue">— Ложись, — сказал он тихо. — Я посторожу.</p>
            <p class="dialogue">— Не хочу, — ответила она. — А вдруг ты... ну...</p>
            <p class="dialogue">— Не уйду, — пообещал он. — Никуда.</p>
            <p>Она посмотрела на него долгим, изучающим взглядом. Проверила, не врёт ли. Не нашла лжи.</p>
            <p class="dialogue">— Ладно, — сказала она. — Но если что — буди.</p>
            <p class="dialogue">— Разбужу.</p>
            <p>Она придвинулась ближе. Положила голову ему на плечо. Рэй чувствовал, как её волосы щекочут ему шею — жёсткие, спутанные, пахнущие дымом.</p>
            <p class="dialogue">— Рэй, — прошептала она.</p>
            <p class="dialogue">— М?</p>
            <p class="dialogue">— Ты только... ты только не умирай, ладно? Я без тебя не справлюсь.</p>
            <p>Он не ответил. Только прижался щекой к её макушке.</p>
            <p>Через минуту она уже спала — провалилась в сон так же внезапно, как Оливер, только без храпа. Рэй слышал её ровное дыхание, чувствовал, как вздымается и опускается её грудь в такт.</p>
            <p>И сидел, глядя в темноту.</p>
            <p>Не спал.</p>
            <p>Ждал рассвета.</p>
            <h3>6. Рассвет</h3>
            <p>Небо светлело медленно.</p>
            <p>Сначала просто перестало быть чёрным — стало тёмно-серым, потом серым, потом бледно-серым, с едва заметными розовыми прожилками на востоке. Туман поднялся над землёй — странный, белый, непохожий на обычный. Он стелился низко, почти у самой земли, и в нём тонули очертания камней и редких уцелевших деревьев.</p>
            <p>Рэй смотрел, как просыпается мир.</p>
            <p>Тот самый мир, который он едва не уничтожил.</p>
            <p>Земля под ногами — там, где недавно корчилась в агонии, плавясь и закипая, — теперь остыла. Покрылась мелкой, едва заметной испариной, будто плакала. Или потела. Или просто пыталась прийти в себя после всего, что случилось.</p>
            <p>Воздух пах мокрой золой и ещё чем-то свежим, утренним — может, росой, может, просто надеждой.</p>
            <p>Где-то далеко закричала птица.</p>
            <p>Одна. Потом вторая.</p>
            <p>Жизнь возвращалась.</p>
            <p>Рэй посмотрел на спящую Марту. На её размазанную тушь — теперь она размазалась ещё сильнее, превратив лицо в абстрактную картину. На грязь на щеке, въевшуюся в кожу так, что не оттрёшь без мыла и мочалки. На припухшие от слёз губы, чуть приоткрытые во сне.</p>
            <p>Такая обычная.</p>
            <p>Такая живая.</p>
            <p>Такая тёплая.</p>
            <p>И вдруг он понял, что всё это время искал не там.</p>
            <p>Он думал, что тепло — это когда тебя любят. Когда ты кому-то нужен. Когда рядом есть кто-то, кто смотрит на тебя и не видит монстра, не боится, не отворачивается.</p>
            <p>А оказалось — теплее просто сидеть вот так.</p>
            <p>Когда ты сам решаешь, кому позволить быть рядом. Когда ты выбираешь — не из страха одиночества, не потому что больше не к кому пойти, а потому что этот человек — он твой. Несмотря ни на что. Вопреки всему. Просто потому что он есть.</p>
            <p>Марта вздохнула во сне и плотнее прижалась к его плечу. Её рука, лежавшая у него на колене, чуть сжалась.</p>
            <p>Рэй осторожно, боясь разбудить, коснулся губами её макушки.</p>
            <p>Волосы пахли дымом и ещё чем-то неуловимо-знакомым. Тем запахом, который он уже не мог отделить от неё.</p>
            <p class="important">— Я разберусь, — прошептал он так тихо, что даже сам едва услышал. — Я обещаю.</p>
            <p>Где-то в глубине сознания Аранис усмехнулся.</p>
            <p>Беззлобно.</p>
            <p>Почти тепло.</p>
            <p class="important">— Посмотрим, мальчик, — прошептал он. — Посмотрим.</p>
            <h3>7. Вместо эпилога</h3>
            <p>Они ушли до того, как солнце поднялось достаточно высоко, чтобы осветить место, где ещё вчера стоял водопад.</p>
            <p>Теперь там была только воронка.</p>
            <p>Ровная, идеально круглая, глубиной метров двадцать, не меньше. Края её оплыли, оплавились, превратившись в стекловидную массу, которая поблёскивала в лучах восходящего солнца. На дне блестела вода — непонятно откуда взявшаяся, чистая, зеркальная. Может, грунтовые воды вышли. Может, дождь ночью прошёл, которого они не заметили. Может, просто чудо.</p>
            <p>Если присмотреться, в воде отражалось небо.</p>
            <p>Не сегодняшнее, серое и хмурое, а какое-то другое — ярко-синее, с редкими пушистыми облаками. Будто там, внизу, был другой мир. Или тот же, но очищенный.</p>
            <p>Оливер, проснувшись, долго смотрел в эту воду. Потом пожал плечами и сказал:</p>
            <p class="dialogue">— Ну хоть не воняет.</p>
            <p>Марта закатила глаза.</p>
            <p>Рэй просто кивнул и пошёл дальше.</p>
            <p>Они шли на север.</p>
            <p>Там, по слухам, были старые шахты, заброшенные ещё во времена первых поселенцев. Говорили, в них можно спрятаться так, что никто не найдёт — ни гильдия, ни охотники, ни случайные путники. Воздух там пропитан ртутью и безумием, говорили. Но для таких, как они, это, наверное, лучшее место.</p>
            <p>Перед тем как скрыться за первым холмом, Рэй обернулся.</p>
            <p>Воронка осталась далеко позади. Маленькая чёрная точка на фоне выжженной равнины.</p>
            <p class="important">— Когда-нибудь, — тихо сказал он. — Когда-нибудь я вернусь. И объясню себе, что там случилось.</p>
            <p class="dialogue">— Ты и сейчас можешь объяснить, — сказала Марта, останавливаясь рядом. — Просто не хочешь.</p>
            <p class="important">— Не хочу, — согласился Рэй. — Пока не хочу.</p>
            <p>Она кивнула, будто именно этого ответа и ждала.</p>
            <p class="dialogue">— Тогда пошли. Оливер опять чуть в яму не упал.</p>
            <p>Рэй усмехнулся.</p>
            <p>Коротко. Почти неслышно. Уголками губ.</p>
            <p>Но усмехнулся.</p>
            <p>И пошёл за ними.</p>
            <p>Внутри, в самой глубине, Аранис молчал.</p>
            <p>Но Рэй чувствовал — не осуждает. Не торопит. Ждёт.</p>
            <p>И это почему-то не пугало.</p>
            <p class="important">Конец первой книги</p>
        `
    },
    {
        number: "Эпилог",
        title: "Тот, кто ждет",
        content: `
            <p>Тишина.</p>
            <p>Воронка. Вода на дне — всё так же зеркальна, всё так же чиста. В ней отражается небо — другое, яркое, почти настоящее.</p>
            <p>И вдруг — рябь.</p>
            <p>По воде проходит дрожь, мелкая, едва заметная. Будто что-то коснулось её изнутри. Рябь расходится кругами, медленно, лениво, и в центре одного из них, на самом дне, загорается свет.</p>
            <p>Красный.</p>
            <p>Тусклый.</p>
            <p>Одинокий.</p>
            <p>Он пульсирует — раз, два, три — в ритме, похожем на сердцебиение. Медленном. Тяжёлом.</p>
            <p>А потом — шёпот.</p>
            <p>Тысячи голосов, слитых в один. Таких тихих, что их можно принять за ветер. Таких древних, что кажется, они звучат здесь с начала времён.</p>
            <p class="important">"Он не знает. Ещё не знает. Но скоро..."</p>
            <p class="important">"Скоро он поймёт, что пробудил не только себя."</p>
            <p class="important">"Скоро он узнает, что такое настоящая тьма."</p>
            <p class="important">"Скоро..."</p>
        `
    }
];


        // ========== ПЕРЕМЕННЫЕ ==========
        let currentChapter = parseInt(localStorage.getItem('oasis_currentChapter')) || 0;
        let baseFontSize = 18;

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        document.addEventListener('DOMContentLoaded', function() {
            createEmbers();
            buildTOC();
            loadChapter(currentChapter);
            loadFontSize();
            updateNavButtons();
        });

        // Создание искр
        function createEmbers() {
            const container = document.getElementById('embers');
            const emberCount = 30;

            for (let i = 0; i < emberCount; i++) {
                const ember = document.createElement('div');
                ember.className = 'ember';
                ember.style.left = Math.random() * 100 + '%';
                ember.style.animationDuration = (Math.random() * 10 + 10) + 's';
                ember.style.animationDelay = (Math.random() * 10) + 's';
                ember.style.width = (Math.random() * 3 + 2) + 'px';
                ember.style.height = ember.style.width;
                
                const colors = ['#ff6b35', '#ff4500', '#ffd700', '#c41e3a'];
                ember.style.background = colors[Math.floor(Math.random() * colors.length)];
                ember.style.boxShadow = `0 0 10px ${ember.style.background}, 0 0 20px ${ember.style.background}`;
                
                container.appendChild(ember);
            }
        }

        // Построение оглавления
        function buildTOC() {
            const tocList = document.getElementById('tocList');
            const totalChapters = document.getElementById('totalChapters');
            totalChapters.textContent = chapters.length;

            chapters.forEach((chapter, index) => {
                const li = document.createElement('li');
                li.className = 'toc-item';
                li.innerHTML = `
                    <span class="toc-chapter">${chapter.number}</span>
                    <div class="toc-chapter-title">${chapter.title}</div>
                `;
                li.onclick = () => goToChapter(index);
                tocList.appendChild(li);
            });
        }

        // Загрузка главы
        function loadChapter(index) {
            if (index < 0 || index >= chapters.length) return;

            currentChapter = index;
            const chapter = chapters[index];
            
            // Обновление контента
            const bookContent = document.getElementById('bookContent');
            bookContent.innerHTML = `
                <div class="chapter-number">${chapter.number}</div>
                <h1 class="chapter-title">${chapter.title}</h1>
                <div class="chapter-content">${chapter.content}</div>
            `;

            // Обновление прогресса
            const progress = ((index + 1) / chapters.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';

            // Обновление номера главы
            document.getElementById('currentChapterNum').textContent = index + 1;

            // Сохранение прогресса
            localStorage.setItem('oasis_currentChapter', index);

            // Обновление оглавления
            updateTOCActive();
            updateNavButtons();

            // Прокрутка вверх
            window.scrollTo(0, 0);
        }

        // Обновление активного элемента в оглавлении
        function updateTOCActive() {
            const items = document.querySelectorAll('.toc-item');
            items.forEach((item, index) => {
                item.classList.toggle('active', index === currentChapter);
            });
        }

        // Обновление кнопок навигации
        function updateNavButtons() {
            document.getElementById('prevBtn').disabled = currentChapter === 0;
            document.getElementById('nextBtn').disabled = currentChapter === chapters.length - 1;
        }

        // Переключение оглавления
        function toggleTOC() {
            document.getElementById('tocOverlay').classList.toggle('active');
            document.getElementById('tocPanel').classList.toggle('active');
        }

        // Переход к главе
        function goToChapter(index) {
            loadChapter(index);
            toggleTOC();
        }

        // Предыдущая глава
        function prevChapter() {
            if (currentChapter > 0) {
                loadChapter(currentChapter - 1);
            }
        }

        // Следующая глава
        function nextChapter() {
            if (currentChapter < chapters.length - 1) {
                loadChapter(currentChapter + 1);
            }
        }

        // Изменение размера шрифта
        function changeFontSize(delta) {
            baseFontSize = Math.max(14, Math.min(28, baseFontSize + delta));
            document.body.style.setProperty('--font-size', baseFontSize + 'px');
            localStorage.setItem('oasis_fontSize', baseFontSize);
        }

        // Сброс размера шрифта
        function resetFontSize() {
            baseFontSize = 18;
            document.body.style.setProperty('--font-size', baseFontSize + 'px');
            localStorage.setItem('oasis_fontSize', baseFontSize);
            showNotification('Размер шрифта сброшен');
        }

        // Загрузка размера шрифта
        function loadFontSize() {
            const savedSize = localStorage.getItem('oasis_fontSize');
            if (savedSize) {
                baseFontSize = parseInt(savedSize);
                document.body.style.setProperty('--font-size', baseFontSize + 'px');
            }
        }

        // Показать уведомление
        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.classList.add('show');
            setTimeout(() => {
                notification.classList.remove('show');
            }, 2000);
        }

        // Горячие клавиши
        document.addEventListener('keydown', function(e) {
            // Не обрабатывать при фокусе на инпутах
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

            switch(e.key) {
                case 'ArrowLeft':
                    prevChapter();
                    break;
                case 'ArrowRight':
                    nextChapter();
                    break;
                case 'Escape':
                    if (document.getElementById('tocPanel').classList.contains('active')) {
                        toggleTOC();
                    }
                    break;
            }
        });
    </script>
