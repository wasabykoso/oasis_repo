<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OASIC: Потерянная душа | Читалка</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* ===== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ===== */
        :root {
            --fire-orange: #ff6b35;
            --fire-red: #c41e3a;
            --fire-gold: #ffd700;
            --dark-bg: #0a0a0a;
            --text-light: #f5f5f5;
            --ember: #ff4500;
            --text-gold: #d4af37;
            --accent-orange: #cc5500;
            --border-rust: #8b3a3a;
            --paper-bg: #f4e4c1;
            --paper-dark: #e8d8b5;
            --ink: #2c1810;
            --shadow: rgba(0, 0, 0, 0.5);
            
            /* Размеры книги */
            --book-width: min(900px, 95vw);
            --page-padding: clamp(1.5rem, 5vw, 4rem);
            
            /* Анимации */
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            
            /* Шрифт */
            --font-size: 18px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: var(--dark-bg);
            color: var(--text-light);
            overflow-x: hidden;
            min-height: 100vh;
            line-height: 1.8;
            font-size: var(--font-size);
        }

        /* ===== ОГНЕННЫЙ ФОН ===== */
        .fire-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 50%, #1a0a0a 0%, #0a0502 100%);
            z-index: -2;
        }

        .ember-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .ember {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--fire-orange);
            border-radius: 50%;
            filter: blur(1px);
            box-shadow: 0 0 10px var(--fire-orange), 0 0 20px var(--fire-red);
            animation: float-up linear infinite;
        }

        @keyframes float-up {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(0.5); opacity: 0; }
        }

        /* ===== ПРОГРЕСС БАР ===== */
        .progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--fire-orange), var(--fire-gold));
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--fire-orange);
        }

        /* ===== ПАНЕЛЬ УПРАВЛЕНИЯ ===== */
        .control-panel {
            position: fixed;
            top: 4px;
            left: 0;
            right: 0;
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, rgba(10, 10, 10, 0.95) 0%, transparent 100%);
            backdrop-filter: blur(10px);
            z-index: 999;
        }

        .panel-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .home-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            color: var(--text-light);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            text-decoration: none;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .home-btn:hover {
            border-color: var(--fire-orange);
            color: var(--fire-orange);
        }

        .chapter-info {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .chapter-info strong {
            color: var(--fire-gold);
        }

        .panel-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .font-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .font-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: var(--text-light);
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .font-btn:hover {
            background: rgba(255, 107, 53, 0.2);
            border-color: var(--fire-orange);
        }

        .toc-btn {
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            color: var(--text-light);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .toc-btn:hover {
            border-color: var(--fire-orange);
            color: var(--fire-orange);
        }

        /* ===== КНИЖНАЯ СТРАНИЦА ===== */
        .book-container {
            min-height: 100vh;
            padding: 6rem 1rem 4rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .book-page {
            width: var(--book-width);
            max-width: 900px;
            background: linear-gradient(145deg, var(--paper-bg), var(--paper-dark));
            color: var(--ink);
            border-radius: 4px;
            padding: var(--page-padding);
            position: relative;
            box-shadow: 
                0 0 50px rgba(0, 0, 0, 0.5),
                inset 0 0 100px rgba(139, 69, 19, 0.1);
        }

        /* Эффект обгоревших краев */
        .book-page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                linear-gradient(90deg, rgba(139, 69, 19, 0.3) 0%, transparent 5%),
                linear-gradient(270deg, rgba(139, 69, 19, 0.3) 0%, transparent 5%),
                linear-gradient(180deg, rgba(139, 69, 19, 0.2) 0%, transparent 3%),
                linear-gradient(0deg, rgba(139, 69, 19, 0.2) 0%, transparent 3%);
            pointer-events: none;
            border-radius: 4px;
        }

        /* Декоративные уголки */
        .corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: var(--border-rust);
            border-style: solid;
            opacity: 0.4;
        }

        .corner-tl { top: 10px; left: 10px; border-width: 2px 0 0 2px; }
        .corner-tr { top: 10px; right: 10px; border-width: 2px 2px 0 0; }
        .corner-bl { bottom: 10px; left: 10px; border-width: 0 0 2px 2px; }
        .corner-br { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; }

        .book-content {
            position: relative;
            z-index: 1;
        }

        .chapter-number {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent-orange);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 0.5rem;
        }

        .chapter-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            color: var(--ink);
            margin-bottom: 2rem;
            line-height: 1.3;
        }

        .chapter-content p {
            margin-bottom: 1.2rem;
            text-align: justify;
            hyphens: auto;
        }

        .chapter-content .important {
            color: var(--fire-red);
            font-weight: 600;
        }

        .chapter-content .dialogue {
            color: var(--accent-orange);
            font-style: italic;
            padding-left: 1rem;
            border-left: 2px solid var(--border-rust);
            margin: 1rem 0;
        }

        .chapter-content .epigraph {
            font-style: italic;
            color: #666;
            text-align: center;
            padding: 1rem 2rem;
            border-top: 1px solid var(--border-rust);
            border-bottom: 1px solid var(--border-rust);
            margin: 2rem 0;
        }

        .chapter-content .action {
            text-align: center;
            font-weight: 600;
            color: var(--text-gold);
            padding: 1rem;
        }

        .chapter-content h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--ink);
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(139, 69, 19, 0.3);
        }

        /* ===== НАВИГАЦИЯ ===== */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(139, 69, 19, 0.2);
        }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1.5rem;
            background: var(--paper-dark);
            border: 1px solid var(--border-rust);
            border-radius: 4px;
            color: var(--ink);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .nav-btn:hover:not(:disabled) {
            background: var(--paper-bg);
            border-color: var(--fire-orange);
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .nav-btn.prev {
            margin-right: auto;
        }

        .nav-btn.next {
            margin-left: auto;
        }

        /* ===== ОГЛАВЛЕНИЕ ===== */
        .toc-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1001;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition-smooth);
        }

        .toc-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .toc-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            max-width: 90vw;
            height: 100%;
            background: linear-gradient(180deg, #151515, #0a0a0a);
            border-left: 1px solid var(--border-rust);
            z-index: 1002;
            transition: right 0.3s ease;
            overflow-y: auto;
        }

        .toc-panel.active {
            right: 0;
        }

        .toc-header {
            position: sticky;
            top: 0;
            padding: 1.5rem;
            background: linear-gradient(180deg, #151515, #0a0a0a);
            border-bottom: 1px solid var(--border-rust);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .toc-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--fire-gold);
        }

        .toc-close {
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 2rem;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .toc-close:hover {
            color: var(--fire-orange);
        }

        .toc-list {
            list-style: none;
            padding: 1rem;
        }

        .toc-item {
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .toc-item:hover {
            background: rgba(255, 107, 53, 0.1);
        }

        .toc-item.active {
            background: rgba(255, 107, 53, 0.2);
            border-left: 3px solid var(--fire-orange);
        }

        .toc-chapter {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            color: var(--fire-orange);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .toc-chapter-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            color: var(--text-light);
            margin-top: 0.3rem;
        }

        /* ===== УВЕДОМЛЕНИЕ ===== */
        .notification {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 1rem 2rem;
            background: linear-gradient(145deg, #1a1a1a, #0d0d0d);
            border: 1px solid var(--fire-orange);
            border-radius: 8px;
            color: var(--text-light);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .notification.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* ===== АДАПТИВНОСТЬ ===== */
        @media (max-width: 768px) {
            .control-panel {
                padding: 0.8rem 1rem;
                flex-wrap: wrap;
                gap: 0.5rem;
            }

            .chapter-info {
                display: none;
            }

            .book-page {
                padding: 2rem 1.5rem;
            }

            .nav-buttons {
                flex-direction: column;
                gap: 1rem;
            }

            .nav-btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- Фон -->
    <div class="fire-bg"></div>
    <div class="ember-container" id="embers"></div>

    <!-- Прогресс бар -->
    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- Панель управления -->
    <div class="control-panel">
        <div class="panel-left">
            <a href="index.html" class="home-btn">← На главную</a>
            <span class="chapter-info">Глава <strong id="currentChapterNum">1</strong> из <strong id="totalChapters">10</strong></span>
        </div>
        <div class="panel-right">
            <div class="font-controls">
                <button class="font-btn" onclick="changeFontSize(-2)" title="Уменьшить">A-</button>
                <button class="font-btn" onclick="resetFontSize()" title="Сбросить">↺</button>
                <button class="font-btn" onclick="changeFontSize(2)" title="Увеличить">A+</button>
            </div>
            <button class="toc-btn" onclick="toggleTOC()">Оглавление</button>
        </div>
    </div>

    <!-- Книга -->
    <div class="book-container">
        <div class="book-page">
            <!-- Уголки -->
            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>

            <div class="book-content" id="bookContent">
                <!-- Контент загружается JavaScript -->
            </div>

            <!-- Навигация -->
            <div class="nav-buttons">
                <button class="nav-btn prev" id="prevBtn" onclick="prevChapter()">
                    ← Предыдущая
                </button>
                <button class="nav-btn next" id="nextBtn" onclick="nextChapter()">
                    Следующая →
                </button>
            </div>
        </div>
    </div>

    <!-- Оглавление -->
    <div class="toc-overlay" id="tocOverlay" onclick="toggleTOC()"></div>
    <div class="toc-panel" id="tocPanel">
        <div class="toc-header">
            <h2 class="toc-title">Оглавление</h2>
            <button class="toc-close" onclick="toggleTOC()">&times;</button>
        </div>
        <ul class="toc-list" id="tocList">
            <!-- Заполняется JavaScript -->
        </ul>
    </div>

    <!-- Уведомление -->
    <div class="notification" id="notification"></div>

    <script>
        // ========== ПОЛНЫЙ ТЕКСТ КНИГИ (ВСЕ ГЛАВЫ) ==========
        const chapters = [
    {
        number: "Введение",
        title: "Мир, который видел только тень",
        content: `
            <p>Oasic — мир, где можно стать кем угодно.</p>
            <p>Но чаще всего ты становишься тем, кем тебя видят люди.</p>
            <p>Главный герой — <span class="important">Рэй</span> — знал это лучше всех. Всю жизнь он был идеальным лавриком: согревал дома, улыбался соседям, чинил термо-лампы в мастерской отца. Он верил, что если играть по правилам, мир ответит тебе добром.</p>
            <p class="important">Он ошибался.</p>
            <p>Предательство лучшего друга. Холодный взгляд отца, видевшего в нем лишь пару рабочих рук. Равнодушие города, который годами пользовался его теплом, но отвернулся в трудную минуту.</p>
            <p>По капле — день за днем — это <span class="important">убивало в нем доброту</span>.</p>
            <p>Теперь в его груди тлел не огонь — <span class="important">только пепел</span>.</p>
            <p>Но именно в этом пепле скрывалась <span class="important">невероятная сила</span>. Безмолвно, тайно, он стал сильнейшим волшебником Oasic. Тем, кто мог бы сжечь весь этот лживый мир дотла... если бы захотел.</p>
            <p>Но он скрывал свою силу. Пока...</p>
            <p>Пока в его жизни не появилась <span class="important">она</span> — девушка, которая увидела в нем не лаврика, не инструмент, а человека.</p>
        `
    },
    {
        number: "Глава 1",
        title: "Последняя лампа",
        content: `
            <h3>1. Город, который забыл о благодарности</h3>
            <p>Пар поднимался от мостовых Теплиса, окутывая улицу Пылающих Фонарей влажной дымкой. Рэй шел, не обращая внимания на знакомые вывески мастерских и пекарен. Его сапоги оставляли на теплых камнях едва заметные дымящиеся следы — побочный эффект дара, который он так ненавидел.</p>
            <p class="dialogue">"Рэй! Подожди!"</p>
            <p>Он обернулся. Маленькая девочка с обожженными пальцами — дочь пекаря — бежала за ним, сжимая в руках потухшую лампу.</p>
            <p class="dialogue">"Она снова не работает... Папа говорит, без тепла хлеб не поднимется."</p>
            <p>Рэй вздохнул, но взял лампу. Его пальцы автоматически нашли трещину на стекле.</p>
            <p class="dialogue">"Видишь эту щель? Когда ты бежишь, масло вытекает."</p>
            <p>Он провел пальцем по трещине, и стекло затянулось тонкой нитью расплавленного кварца. "Теперь попробуй."</p>
            <p>Девочка щелкнула механизмом. Лампа вспыхнула ровным пламенем.</p>
            <p class="dialogue">"Спасибо! Ты волшебник!"</p>
            <p>Рэй усмехнулся. Если бы она знала...</p>
            <p class="dialogue">"Эй, угольный мозг! Опять бесплатно работаешь?"</p>
            <p>Голос Торина раздался из-за спины. Блаж сидел на низкой крыше, перебирая перья в своих иссиня-черных волосах.</p>
            <p class="dialogue">"Это заняло две минуты," буркнул Рэй.</p>
            <p class="dialogue">"Две минуты, пять минут, час... Сколько еще будешь тратить свой дар на этих дармоедов?"</p>
            <p>Рэй резко развернулся к нему:</p>
            <p class="dialogue">"Лучше на них, чем на воришек."</p>
            <p>Торин поднял брови:</p>
            <p class="dialogue">"Ой-ой, кто-то сегодня злой. Что, отец опять..."</p>
            <p class="dialogue">"Заткнись."</p>
            <p>Рэй сжал кулаки, чувствуя, как по коже побежали мурашки — предвестник вспышки гнева.</p>
            <p>Торин отступил на шаг, но не замолчал:</p>
            <p class="dialogue">"Я серьезно. Ты что, собираешься всю жизнь чинить их лампы? Когда у тебя..."</p>
            <p class="dialogue">"Я сказал, заткнись!"</p>
            <p>Рэй резко выдохнул, и из его рта вырвалось маленькое облачко пара. Камни под ногами на мгновение раскалились докрасна.</p>
            <p>Торин замер. Его перья взъерошились.</p>
            <p class="dialogue">"Черт... Ты становишься страшным, дружище."</p>
            <p>Рэй уже открыл рот для очередной колкости, когда из-за угла послышался знакомый голос:</p>
            <p class="dialogue">"Рэй! Где ты пропадаешь? Печь готова взорваться!"</p>
            <p>Это был Гарт, подмастерье отца. Лицо его было испачкано сажей, а в руках он сжимал перекореженный металлический стержень.</p>
            <p>Рэй закрыл глаза на секунду. Еще один день в Теплисе начинался.</p>
            <h3>2. Работа, которая больше не грела душу</h3>
            <p>Мастерская "Стальное Тепло" встретила Рэя привычным хаосом. Десяток подмастерий стучали молотами, двое раздували мехами печь, а в центре всего этого стоял Грей — его отец и самый строгий учитель в Теплисе.</p>

            <p>Элис, всегда такая сильная, стояла на коленях, сжав голову руками. Она не могла возражать. Это были её собственные, самые глубокие страхи, облечённые в голос самого дорогого человека.</p>
            <p class="dialogue">«ЗАТКНИСЬ!» — взревел Рэй, и его нимб вспыхнул алым, тени взметнулись, но снова не нашли цели.</p>
            <p>Призрак лишь усмехнулся. <span class="dialogue">«Она никогда не будет твоей, мальчик. Её душа принадлежит прошлому. Моему прошлому».</span></p>
            <h3>3. Смена тактики: Битва за душу</h3>
            <p>Рэй понял. Силой тут ничего не добиться. Это битва, которую может выиграть только она. Но он может дать ей оружие.</p>
            <p>Он опустил свой клинок. Тени у его ног успокоились. Он медленно подошёл к Элис и встал на колени перед ней, заслоняя её от призрака своим телом. Он смотрел не на монстра, а в её глаза, полные от ужаса и боли.</p>
            <p class="dialogue">«Элис, послушай меня», — его голос был тихим, но твёрдым, как сталь. «Это не твой отец. Твой отец любил тебя. Он гордился бы тобой сейчас. Гордился бы тем, что ты нашла в себе силы выбрать себя. Выбрать правду своего сердца».</p>
            <p class="dialogue">«Он лжёт...» — прошипела тень.</p>
            <p class="important">«ТВОЯ БОЛЬ — МОЯ БОЛЬ!» — крикнул Рэй, и его слова прозвучали как заклинание, от которого задрожала сама реальность. Он взял её лицо в свои руки. «ТВОЁ ПРОШЛОЕ — МОЁ. Каждое предательство, каждая насмешка, каждая слеза... я чувствую их, как свои. И я НЕ ПОЗВОЛЮ ЕМУ ЗАБРАТЬ ТЕБЯ! Ни этому призраку, ни гильдии, ни всему миру!»</p>
            <h3>4. Прощание</h3>
            <p>Слёзы текли по лицу Элис, но теперь это были не слёзы отчаяния, а слёзы очищения. Она смотрела на Рэя, и в её глазах медленно возвращалась сила. Она обернулась к призраку.</p>
            <p class="dialogue">«Ты прав, папа», — тихо сказала она. «Ты умер, сражаясь за свою правду. И теперь я живу, сражаясь за свою. Моя правда — это он. Моя правда — это наше будущее. Я не предала твою память. Я продолжила твоё дело — я защищаю того, кого несправедливо преследуют. И я прощаю тебя. Прощаю за то, что ты оставил меня. И прошу... отпусти меня».</p>
            <p>Призрак отца замер. Его черты поплыли, исказились. На мгновение в пустых глазницах мелькнула та самая, тёплая отеческая любовь, которую она помнила.</p>
            <p class="dialogue">«Живи, дочка...» — прошептал призрак, и его голос стал мягким, родным. И он рассыпался пеплом, который унёс внезапно налетевший ветер.</p>
            <p>Элис, всё ещё дрожа, обняла Рэя, вцепившись в него как в спасательный круг.</p>
            <p class="dialogue">«Он... ушёл».</p>
            <p class="dialogue">«Нет, — поправил Рэй, гладя её по волосам. — Он наконец-то обрёл покой. И ты тоже».</p>
            <p>Шрам на её запястье больше не пылал. Он был просто шрамом. Напоминанием, но не клеймом. Её старые раны, наконец, начали заживать. Не потому, что боль ушла, а потому, что она нашла того, кто помог ей нести её тяжесть.</p>
            <h3>Эпилог кошмара в позолоте</h3>
            <p>Их свадьба была простой, тихой и совершенной. Оливер, с лицом, вымазанным сажей от взорвавшегося «торжественного фейерверка», и носом, торжественно распухшим от слёз, исполнял роль священника, тамады и оркестра. Марта, стиснув зубы, чтобы не разреветься, то и дело поправляла Элис фату — тот самый подарок, сотканный из лунного сияния и паутины лесных духов. Она вплетала в неё каждую ниточку с мыслью: «Пусть он будет счастлив». И пусть её собственное сердце в этот момент сжималось от щемящей, невысказанной боли. Она отдавала его счастье в другие руки, потому что любила его достаточно, чтобы желать ему света, даже если его источником будет не она.</p>
            <p>Рэй смотрел на Элис, и ему казалось, что все трещины в его душе, все шрамы от тьмы, наконец, затянулись не золотом, а живой, теплой плотью новой жизни. Её улыбка была его личным солнцем, её смех — единственным воздухом, которым он хотел дышать. Произнося клятвы, его голос, привыкший рвать пространство шёпотом, звучал тихо, ясно, без единой трещины. Он клялся быть её щитом, её покоем, её тихой гаванью. Он верил. Он верил так сильно, что эта вера стала новой, хрупкой реальностью.</p>
            <p>Первый месяц в древней башне на краю Цветущих долин был вырванным у судьбы подарком. Рэй силой своей воли, а не разрушения, взрастил вокруг сад. Цветы в нём цвели невиданные, их лепестки переливались, как крылья мотыльков-вестников. Элис напевала на кухне старые песенки Теплиса, и этот звук был для него слаще любой магии, сильнее любого гримуара. Он оттаял. Его нимб, бывший чёрным лезвием, рассекавшим реальность, превратился в лёгкую дымку, ореол спокойствия. Тени стали послушными слугами, приносящими книги и поддерживающими тяжёлые ветви. Даже голос в гримуаре затих, будто уснул, убаюканный этой ложной идиллией.</p>
            <p>Он нашёл причину сдерживать ураган. Причину дышать. Причину быть человеком. Её имя было Элис.</p>
            <h3>Первая трещина на лакированной поверхности</h3>
            <p>Идиллия, как и всё хрупкое, не могла длиться вечно. Но разрушил её не случайный удар, а медленный, методичный яд.</p>
            <p>Марта заметила неладное первой. Не в Рэе, сияющем, как никогда, — в Элис.</p>
            <p>Сначала — мелочи. Слишком навязчивые расспросы. <span class="dialogue">«Милая, а как именно работает твоя связь с тенями? Где самый уязвимый момент? Что чувствуешь, когда теряешь контроль?»</span> — <span class="dialogue">«Просто интересуюсь своим мужем, его миром»,</span> — звучал в ответ медовый голос. Но Марта ловила в её глазах, когда та думала, что её не видят, холодный, аналитический блеск. Блеск алхимика, изучающего редкий, опасный реактив.</p>
            <p>Потом — «прогулки». На рассвете. «Собираю особые травы для чая», «Ищу вдохновение для новой песни». Возвращалась с пустыми руками, но с едва уловимой усталостью в осанке и странным запахом — смесью дорогого благовония и окислившегося металла. Запахом чужих комнат и чужих заговоров.</p>
            <p>Ревность в Марте вспыхнула не пожаром, а тлением. Она видела, как Рэй, тот самый Рэй с глазами пустоты, расцветает. И поливал этот цветок не её труд, не её терпение, а улыбка другой. И эта другая пахла ложью. Для Марты, чей ум был скальпелем для тайн, это стало вызовом. Любовь переплелась с подозрением, забота — с навязчивой идеей. Она должна была знать. Должна была защитить его, даже от него самого, даже если он этого не хочет.</p>
            <p>Она начала следить.</p>
            <h3>Тень, преследующая призрак</h3>
            <p>Марта стала мастером невидимости. Порошки, заглушающие шаги, маскировочные чары, врождённая способность становиться частью пейзажа — всё было пущено в ход. Она выследила маршрут Элис. Та не бродила бесцельно. Она чётко шла к Руинам Говорящих Камней — месту сильной, хаотичной остаточной магии, идеальному для того, чтобы спрятать разговор от любых ушей, в том числе и от сверхчувствительного слуха лаврика.</p>
            <p>Затаившись за обломком колонны, которая тихо стонала о прошлом, Марта увидела его.</p>
            <p>Мужчину в плаще. Порыв ветра откинул капюшон.</p>
            <p>Иссиня-чёрные волосы. Несколько обгоревших перьев, воткнутых с насмешливой небрежностью. Знакомая, язвительная ухмылка, от которой когда-то таяли сердца.</p>
            <p class="important">Торин.</p>
            <p>Всё внутри Марты оборвалось и рухнуло в ледяную бездну. Она знала. Знала всю историю. Клеймо. Изгнание. Первое, самое горькое предательство.</p>
            <p>И теперь он стоял здесь. И Элис была в его объятиях. Это не было дружеским приветствием. Его руки скользили по её спине с похабной, владельческой уверенностью. Их поцелуй был долгим, жадным, лишённым даже тени игры. Это был поцелуй сообщников, любовников, хищников, делящих добычу.</p>
            <p>И они говорили. Марта, задержав дыхание, ловила обрывки, прорывавшиеся сквозь шёпот руин.</p>
            <p class="dialogue">«…он полностью расслабился. Верит каждому моему слову. Спит, как младенец, доверчивый идиот…» — голос Элис. Но какой же он был другой! Металлический, деловой, лишённый всех тех тёплых интонаций, что она использовала для Рэя.</p>
            <p class="dialogue">«Идеально. Значит, доверит и последнее. Ключ», — голос Торина, сладкий, как сироп, и ядовитый, как цикута.</p>
            <p class="dialogue">«Его сила… она в двух замках. Гримуар и его собственные эмоции. Сломаешь один — получишь доступ ко второму. Он сам откроет нам всё».</p>
            <p class="dialogue">«Сентиментальный болван. Всегда таким был. Думал, что мир можно исправить добротой. Мир исправляют силой и предательством, Рэй. Спасибо, что не изменился».</p>
            <p class="dialogue">«Моя задача — добить. Чтобы он сам всё выпустил. Чтобы его любовь превратилась в кислоту и разъела его изнутри. Чтобы он увидел, что его свет — гнилушка, кишащая червями».</p>
            <p>Элис засмеялась. Этот смех пронзил Марту острее обсидианового клинка. В нём было торжество. Презрение. Удовольствие.</p>
            <p class="dialogue">«Не волнуйся. Завтра. Завтра устрою сценку. Найду повод. А потом… ты появишься. И его карточный домик рухнет. И тогда… тогда его сила вырвется на свободу. Он станет монстром, которого все боятся. Чистым, неконтролируемым оружием. А мы… мы возьмём гримуар. Сила Первого Изгнанника будет нашей. Вся».</p>
            <p class="dialogue">Торин притянул её к себе, его губы коснулись её виска. «Моя гениальная актриса. Моя прекрасная, беспощадная тварь. После этого… Теплис, Фейнвинд, весь этот жалкий мир будет ползать у наших ног. И мы растопчем его. В отместку. За всё».</p>
            <p>Марта отползла, не чувствуя ног. В ушах стоял вой. Мир, который только что имел хоть какую-то опору, рассыпался в пыль. Это была не измена. Это была казнь. Тщательно спланированная, хладнокровная экзекуция души. Они не просто хотели использовать Рэя. Они хотели сломать его в щепки, чтобы из обломков собрать орудие, выжечь в нём всё человеческое и посмеяться над пеплом.</p>
            <p>И она, ревнующая, слепая дура, была свидетелем подготовки к убийству.</p>
            <h3>Бессилие с горьким привкусом яда</h3>
            <p>Сказать ему? Кричать? Бежать и трясти его за плечи? Марта металась в своей комнате, кусая кулак до крови. Она представляла его лицо. То выражение покоя, которое появилось там так недавно. И представляла, как оно треснет, как сначала будет недоверие (<span class="dialogue">«Марта, ты сводишь счёты!»</span>), а потом — пустота. Ледяная, мертвящая пустота осознания.</p>
            <p>Она решила действовать иначе. Помешать. Сорвать. Но как? Обвинения без доказательств — идеальная почва для её же остракизма. Элис сыграет оскорблённую невинность, и Рэй, ослеплённый, поверит ей. Нужно было поймать их с поличным. Заставить его увидеть самому.</p>
            <p>Марта продолжила слежку, копя в душе ледяную ярость и безнадёжность. Она видела, как Элис, переступая порог башни, сбрасывала с лица маску холодной расчётливости, как по волшебству наполняя глаза той самой тёплой, лучистой нежностью для Рэя. Это было высшим пилотажем лицемерия. И каждый такой момент был для Марты ножом в сердце.</p>
            <p>А Рэй… Рэй парил в облаках слепого, бездумного счастья. Он доверял Элис самые сокровенные тайны своей силы, свои страхи, точки напряжения. Он, как дитя, вручал ей отмычки от сейфа со своим демоном, даже не подозревая, что она готовится не выпустить его, а запереть навсегда, забрав ключ себе.</p>
            <h3>Развязка. Спектакль в одном действии</h3>
            <p>День выбрали солнечный, ясный, насмешливо-прекрасный.</p>
            <p>Элис, как всегда, предложила прогулку к водопаду, к их «месту силы». Рэй согласился с улыбкой, которая сейчас резала Марту по живому. Она притворилась больной, осталась в башне, а её душа разрывалась на части от предчувствия. Оливер, чуявший беду, как животное чует грозу, бесцельно бродил по мастерской, роняя склянки и что-то бессвязно бормоча.</p>
            <p>У водопада, под радугой из брызг, Элис начала играть. Повод — пустяк. Забытое мелкое обещание. Но тон её изменился мгновенно. Стал острым, колючим, отточенным. Она говорила о его силе как о проказе, о нём — как о вечном инвалиде, обречённом пугать собой тех, кто рядом. О своей усталости быть «хранительницей монстра».</p>
            <p>Рэй был ошеломлён. Он пытался найти оправдания, вспомнить слова любви, успокоить. Но маска на её лице дала трещину, и из-под неё хлынула настоящая, неприкрытая жестокость.</p>
            <p class="dialogue">«Хватит! — выкрикнула она, и её голос звенел, как разбиваемое стекло. — Хватит строить из себя жертву! Ты — чудовище. Играющее в человека. И я устала играть вместе с тобой!»</p>
            <p>И в этот миг из-за деревьев, как по режиссёрской выверенной команде, вышел он.</p>
            <p>Торин. С той самой ухмылкой, что жила в кошмарах Рэя.</p>
            <p>Время остановилось. Гул водопада отодвинулся куда-то в бесконечность. Рэй переводил взгляд с Торина на Элис и обратно. Его мозг, отточенный в боях, отказывался складывать два этих изображения в одну картину. Это был сбой. Глюк. Галлюцинация.</p>
            <p class="dialogue">«Привет, дружище, — Торин положил руку на талию Элис. Она не отпрянула. Напротив, прижалась к нему всем телом, и на её лице расцвела улыбка — та самая, что сводила Рэя с ума, но теперь направленная на другого. — Спасибо, что присмотрел за моим самым ценным сокровищем. И за чертежи, кстати, отдельное спасибо — ушли за бешеные деньги. А она… она мой лучший проект. Самый успешный».</p>
            <p>Каждое слово было отдельным молотом, бьющим по хрустальному дворцу его надежд. Рэй видел, как рушится всё: доверие, исцеление, будущее, сама возможность будущего. Он видел в глазах Элис не раскаяние, а ликующий, пьянящий триумф. Видел, как её прекрасные губы, которые он целовал прошлой ночью, складываются в презрительную, брезгливую гримасу.</p>
            <p class="dialogue">«Ты и правда думал, что такое, как ты, может кто-то полюбить? — её шёпот был похож на шипение змеи. — Жалкое, сломанное существо, вечно ноющее о своей боли? Ты был ступенькой, Рэй. Инструментом. Игрушкой. Спасибо за твою наивность. Она сделала всё так… легко».</p>
            <p>Мир под ногами Рэя не просто ушёл. Он взорвался в абсолютной, беззвучной пустоте. Он не чувствовал земли, не слышал своего сердца. Внутри что-то рухнуло с оглушительным грохотом тишины, и на смену пришла вакуумная, звонкая пустота. Предвестник конца.</p>
            <p>Его остекленевший взгляд блуждал между ними. Он уже не видел людей. Он видел воплощение всей лжи мира, всей несправедливости, всей той грязи, что ему годами пытались скормить вместо хлеба. Отец. Город. Клеймо. Изгнание. Борьба за искупление… И этот финал. Не героическая смерть в бою, не тихий уход. Эта пошлая, грязная сценка у водопада, где его душу вывернули наизнанку, плюнули в неё и растоптали каблуком.</p>
            <p>И из этой пустоты выползло не чувство. Состояние. Безразличие. Ко всему, кроме одной, кристальной цели: чтобы эта боль прекратилась. Навсегда. Чтобы больше ничего не могло причинить боль.</p>
            <p>Машинально, рефлекторно, почти не думая, он поднял руку в сторону башни. Единственная мысль, промелькнувшая в ледяном океане сознания: Они. Не. Должны. Видеть.</p>
            <p>Над башней, где метались Марта и Оливер, вспыхнул Абсолют.</p>

            <p>Пустота внутри Рэя наполнилась. Не чувствами — чувства сгорели дотла. Наполнилась эхом. Эхом боли. Эхом доверия. Эхом любви. И это эхо, множась в зеркалах отчаяния, росло, давило, превращалось в чудовищное, вселенское давление, готовое разорвать ткань бытия.</p>
