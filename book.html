<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OASIC: Дорога из Теплиса</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0a0a;
            --bg-gradient-start: #1a0806;
            --bg-gradient-end: #050302;
            --text-gold: #d4af37;
            --text-gold-light: #e8c962;
            --text-light: #e0e0e0;
            --text-muted: #8a8a8a;
            --accent-fire: #b22222;
            --accent-orange: #cc5500;
            --accent-ember: #ff6b35;
            --border-rust: #8b3a3a;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Огненный фон */
        .fire-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 50% 100%, rgba(180, 60, 30, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 80%, rgba(204, 85, 0, 0.1) 0%, transparent 40%),
                radial-gradient(ellipse at 80% 80%, rgba(178, 34, 34, 0.1) 0%, transparent 40%),
                linear-gradient(180deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            z-index: -2;
        }

        /* Мерцающие угольки */
        .embers {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #ff6b35, transparent),
                radial-gradient(2px 2px at 40px 70px, #ffd700, transparent),
                radial-gradient(3px 3px at 90px 40px, #ff4500, transparent),
                radial-gradient(2px 2px at 130px 80px, #ff8c00, transparent),
                radial-gradient(2px 2px at 160px 120px, #c41e3a, transparent),
                radial-gradient(3px 3px at 200px 50px, #ff6b35, transparent),
                radial-gradient(2px 2px at 250px 160px, #ffd700, transparent),
                radial-gradient(2px 2px at 300px 90px, #ff4500, transparent);
            background-size: 350px 200px;
            animation: emberFloat 15s linear infinite;
            opacity: 0.4;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes emberFloat {
            0% { background-position: 0 0; }
            100% { background-position: 350px 200px; }
        }

        /* Контейнер */
        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
        }

        /* Заголовок */
        .title-block {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInUp 1s ease-out;
        }

        .subtitle {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            color: var(--accent-orange);
            margin-bottom: 1rem;
            opacity: 0;
            animation: fadeIn 0.8s ease-out 0.3s forwards;
        }

        .main-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 700;
            color: var(--text-gold);
            text-shadow: 
                0 0 40px rgba(212, 175, 55, 0.3),
                0 4px 20px rgba(0, 0, 0, 0.8);
            line-height: 1.1;
            letter-spacing: -0.02em;
            opacity: 0;
            animation: fadeIn 0.8s ease-out 0.5s forwards;
        }

        .main-title span {
            display: block;
            font-size: 0.5em;
            font-weight: 400;
            color: var(--text-light);
            letter-spacing: 0.1em;
            margin-top: 0.5rem;
            text-shadow: none;
        }

        /* Обложка книги */
        .book-cover {
            width: 280px;
            height: 400px;
            background: linear-gradient(145deg, #1a1210 0%, #0d0908 100%);
            border: 2px solid var(--border-rust);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 3rem;
            position: relative;
            box-shadow: 
                0 20px 50px rgba(0, 0, 0, 0.8),
                0 0 30px rgba(180, 60, 30, 0.2),
                inset 0 0 30px rgba(0, 0, 0, 0.5);
            opacity: 0;
            animation: fadeInScale 0.8s ease-out 0.7s forwards;
            overflow: hidden;
        }

        .book-cover::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 30% 20%, rgba(212, 175, 55, 0.1) 0%, transparent 50%),
                linear-gradient(180deg, transparent 60%, rgba(180, 60, 30, 0.2) 100%);
            pointer-events: none;
        }

        .book-cover-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-gold);
            text-align: center;
            padding: 0 1.5rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .book-cover-subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 1rem;
            text-align: center;
            padding: 0 1.5rem;
            font-style: italic;
        }

        .book-cover-symbol {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--accent-orange);
            text-shadow: 0 0 20px var(--accent-ember);
        }

        /* Декоративная линия */
        .divider {
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-orange), transparent);
            margin: 0 auto 2rem;
            opacity: 0;
            animation: fadeIn 0.6s ease-out 1s forwards;
        }

        /* Описание */
        .description {
            max-width: 500px;
            text-align: center;
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.8;
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeIn 0.6s ease-out 1.1s forwards;
        }

        .description strong {
            color: var(--text-gold-light);
        }

        /* Кнопка */
        .cta-button {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1.2rem 3rem;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-gold);
            background: linear-gradient(145deg, rgba(30, 15, 10, 0.9), rgba(20, 10, 5, 0.95));
            border: 2px solid var(--border-rust);
            border-radius: 4px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 
                0 8px 25px rgba(0, 0, 0, 0.5),
                0 0 20px rgba(180, 60, 30, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: fadeIn 0.6s ease-out 1.3s forwards;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .cta-button:hover {
            border-color: var(--accent-orange);
            transform: translateY(-3px);
            box-shadow: 
                0 12px 35px rgba(0, 0, 0, 0.6),
                0 0 40px rgba(204, 85, 0, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .cta-button:hover::before {
            left: 100%;
        }

        .cta-button .icon {
            font-size: 1.3rem;
            transition: transform 0.3s ease;
        }

        .cta-button:hover .icon {
            transform: translateX(5px);
        }

        /* Нижняя часть */
        .footer-hint {
            position: absolute;
            bottom: 2rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            opacity: 0;
            animation: fadeIn 0.6s ease-out 1.5s forwards;
        }

        /* Анимации */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Адаптивность */
        @media (max-width: 600px) {
            .container {
                padding: 1.5rem;
            }
            
            .book-cover {
                width: 220px;
                height: 320px;
            }
            
            .book-cover-title {
                font-size: 1.8rem;
            }
            
            .cta-button {
                padding: 1rem 2rem;
                font-size: 1rem;
            }
        }

        /* Эффект свечения вокруг кнопки при наведении */
        .glow-effect {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(204, 85, 0, 0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
            animation: pulseGlow 4s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); }
        }
    </style>
</head>
<body>
    <div class="fire-bg"></div>
    <div class="embers"></div>
    <div class="glow-effect"></div>

    <div class="container">
        <div class="title-block">
            <div class="subtitle">Фантастическая история</div>
            <h1 class="main-title">
                OASIC
                <span>Дорога из Теплиса</span>
            </h1>
        </div>

        <div class="book-cover">
            <div class="book-cover-symbol">🔥</div>
            <div class="book-cover-title">OASIC</div>
            <div class="book-cover-subtitle">Дорога из Теплиса</div>
        </div>

        <div class="divider"></div>

        <p class="description">
            История о <strong>предательстве</strong>, <strong>силе</strong> и <strong>выборе</strong>. 
            Там, где одинокий маг сжигает мосты к прошлому, 
            пепел становится началом нового пути.
        </p>

        <a href="book.html" class="cta-button">
            <span class="icon">⟶</span>
            Войти в пепел
        </a>

        <div class="footer-hint">
            Пепел прошлого тлеет в каждой главе
        </div>
    </div>
</body>
</html>
